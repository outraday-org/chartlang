name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Detect whether the tree still has unconsumed changeset files
    # (.changeset/*.md, excluding README.md). Feature merges carry one;
    # the "Version Packages" merge consumes them, so the publish push to
    # main has none. `test` uses this to skip the redundant matrix on the
    # publish push.
    changes:
        name: Detect pending changesets
        runs-on: ubuntu-latest
        outputs:
            has_changesets: ${{ steps.check.outputs.has_changesets }}
        steps:
            - uses: actions/checkout@v4
            - id: check
              run: |
                  count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
                  echo "pending changesets: $count"
                  if [ "$count" -gt 0 ]; then
                    echo "has_changesets=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "has_changesets=false" >> "$GITHUB_OUTPUT"
                  fi

    test:
        name: Test (${{ matrix.os }} / Node ${{ matrix.node }})
        needs: changes
        # Skip on the changesets "Version Packages" PR, and skip the
        # redundant matrix on the publish push (push to main once the
        # changesets are consumed). Feature merges to main still run the
        # matrix because their changeset files are present. The code in a
        # publish push was already tested on the PR that produced it.
        if: >-
            github.head_ref != 'changeset-release/main' &&
            (github.event_name != 'push' || needs.changes.outputs.has_changesets == 'true')
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm typecheck
            - run: pnpm lint
            - run: pnpm format:check
            - run: pnpm test
            - run: pnpm coverage:report   # merges per-package coverage to ./coverage/lcov.info for Codecov
            - run: pnpm conformance
            - run: pnpm tsx scripts/run-conformance.ts --report --check
            - run: pnpm bench:ci
            - run: pnpm docs:check
            - run: pnpm docs:gate
            - run: pnpm docs:build
            - run: pnpm hover:check
            - run: pnpm skills:gate
            - run: pnpm readme:check
            - if: matrix.os == 'ubuntu-latest' && matrix.node == 20
              uses: codecov/codecov-action@v4
              with:
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false

    # ──────────────────────────────────────────────────────────────────
    # Required-check gate.
    # `test` is skipped on the changeset "Version Packages" PR, which
    # leaves the matrix checks perpetually "Expected" and blocks merge.
    # This job always runs and is the single required status check:
    # it passes when `test` succeeded OR was intentionally skipped, and
    # fails when `test` failed/was cancelled. Point the branch ruleset
    # at "CI Gate" instead of the individual matrix contexts.
    # ──────────────────────────────────────────────────────────────────
    ci-gate:
        name: CI Gate
        needs: test
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Verify test job did not fail
              run: |
                  result="${{ needs.test.result }}"
                  echo "test job result: $result"
                  if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
                    exit 0
                  fi
                  exit 1

    # ──────────────────────────────────────────────────────────────────
    # Release job.
    # Maintainers must add NPM_TOKEN to repo secrets before merging a
    # release PR. Manual fallback: `pnpm publish:release` from a
    # maintainer machine.
    # ──────────────────────────────────────────────────────────────────
    release:
        name: Release
        needs: test
        # Publish on every push to main. `always()` lets this run even
        # when `test` was skipped on the publish push; the result guard
        # still blocks publish if the matrix actually ran and failed.
        if: >-
            always() &&
            github.ref == 'refs/heads/main' &&
            github.event_name == 'push' &&
            needs.test.result != 'failure' &&
            needs.test.result != 'cancelled'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with: { fetch-depth: 0 }
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm, registry-url: "https://registry.npmjs.org" }
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - uses: changesets/action@v1
              with:
                  publish: pnpm release
                  version: pnpm changeset:version
                  title: "chore(release): version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
                  # setup-node's registry-url writes an .npmrc that reads
                  # auth from NODE_AUTH_TOKEN — without it every publish
                  # PUT is unauthenticated and npm replies E404.
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
