name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Decide whether this push to main is the merge of the
    # `changeset-release/main` "Version Packages" PR. First check the merge
    # commit message (available immediately), then fall back to the PR(s)
    # associated with the pushed commit (robust across squash/rebase). The
    # `/commits/{sha}/pulls` association is eventually-consistent and can lag
    # the push by a few seconds, so the fallback polls instead of asking once.
    # `test` uses this to skip the redundant matrix only on that release
    # merge — every other push still runs it.
    detect:
        name: Detect release merge
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        outputs:
            is_release_merge: ${{ steps.check.outputs.is_release_merge }}
        steps:
            - id: check
              env:
                  GH_TOKEN: ${{ github.token }}
                  HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  if [ "${{ github.event_name }}" != "push" ]; then
                    echo "is_release_merge=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  # Fast path: the merge commit message names the branch
                  # immediately (no API lag). Covers the standard merge-commit
                  # subject `Merge pull request #N from <org>/changeset-release/main`.
                  if printf '%s' "$HEAD_COMMIT_MSG" | grep -q "changeset-release/main"; then
                    echo "commit message references changeset-release/main"
                    echo "is_release_merge=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  # Fallback: the PR(s) associated with the pushed commit
                  # (robust across squash/rebase, where the branch name is not
                  # in the commit message). `/commits/{sha}/pulls` is
                  # eventually-consistent — right after a merge it can return an
                  # empty array for a few seconds — so poll until it settles
                  # instead of asking once and losing the race.
                  n=0
                  for attempt in 1 2 3 4 5; do
                    n=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
                          --jq '[.[] | select(.head.ref == "changeset-release/main")] | length')
                    echo "attempt $attempt: associated changeset-release PRs: $n"
                    [ "$n" -gt 0 ] && break
                    sleep 5
                  done
                  if [ "$n" -gt 0 ]; then
                    echo "is_release_merge=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "is_release_merge=false" >> "$GITHUB_OUTPUT"
                  fi

    test:
        name: Test (${{ matrix.os }} / Node ${{ matrix.node }})
        needs: detect
        # Skip on the changesets "Version Packages" PR itself, and skip the
        # redundant matrix only on the push that merges that PR — the code
        # being published was already tested on the PR that produced it.
        # Every other push to main (feature merges) still runs the matrix.
        if: >-
            github.head_ref != 'changeset-release/main' &&
            needs.detect.outputs.is_release_merge != 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm typecheck
            - run: pnpm lint
            - run: pnpm format:check
            - run: pnpm test
            - run: pnpm coverage:report   # merges per-package coverage to ./coverage/lcov.info for Codecov
            - run: pnpm conformance
            - run: pnpm tsx scripts/run-conformance.ts --report --check
            - run: pnpm --filter chartlang-site typecheck
            - run: pnpm --filter chartlang-site build
            - run: pnpm bench:ci
            - run: pnpm docs:check
            - run: pnpm docs:gate
            - run: pnpm docs:committed:check   # git-aware: fails when committed primitive pages drift from the generator (catches a regenerated-but-uncommitted page that the working-tree docs:gate would miss locally)
            - run: pnpm examples:gate
            - run: pnpm examples:sync
            - run: pnpm docs:build
            - run: pnpm hover:check
            - run: pnpm skills:gate
            - run: pnpm converter:docs:check
            - run: pnpm readme:check
            - if: matrix.os == 'ubuntu-latest' && matrix.node == 20
              uses: codecov/codecov-action@v4
              with:
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false

    # ──────────────────────────────────────────────────────────────────
    # apps/site Playwright e2e.
    # Gates the built marketing site's edit→compile→render→recompile
    # loop. Kept behind `needs: test` so the cheaper static gates fail
    # first — no Chromium spin-up when typecheck/build already broke.
    # Own concurrency group so a rebase cancels in-flight e2e runs
    # independently of the matrix.
    # ──────────────────────────────────────────────────────────────────
    e2e-site:
        name: E2E (apps/site/)
        needs: test
        runs-on: ubuntu-latest
        concurrency:
            group: e2e-site-${{ github.ref }}
            cancel-in-progress: true
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter chartlang-site e2e:install
            - run: pnpm --filter "chartlang-site^..." build   # build the site's workspace deps (dist/) — the `test` job gets these from `pnpm build`, this job doesn't
            - run: pnpm --filter chartlang-site build
            - run: pnpm --filter chartlang-site e2e
            - if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: apps/site/playwright-report/
                  retention-days: 7

    # ──────────────────────────────────────────────────────────────────
    # Required-check gate.
    # `test` is skipped on the changeset "Version Packages" PR, which
    # leaves the matrix checks perpetually "Expected" and blocks merge.
    # This job always runs and is the single required status check:
    # it passes when `test` succeeded OR was intentionally skipped, and
    # fails when `test` failed/was cancelled. Point the branch ruleset
    # at "CI Gate" instead of the individual matrix contexts.
    # ──────────────────────────────────────────────────────────────────
    ci-gate:
        name: CI Gate
        needs: [test, e2e-site]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Verify test and e2e-site jobs did not fail
              run: |
                  test_result="${{ needs.test.result }}"
                  e2e_result="${{ needs.e2e-site.result }}"
                  echo "test job result: $test_result"
                  echo "e2e-site job result: $e2e_result"
                  for r in "$test_result" "$e2e_result"; do
                    if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
                      exit 1
                    fi
                  done
                  exit 0

    # ──────────────────────────────────────────────────────────────────
    # Release job.
    # Maintainers must add NPM_TOKEN to repo secrets before merging a
    # release PR. Manual fallback: `pnpm publish:release` from a
    # maintainer machine.
    # ──────────────────────────────────────────────────────────────────
    release:
        name: Release
        needs: [test, e2e-site]
        # Publish on every push to main. `always()` lets this run even
        # when `test`/`e2e-site` were skipped on the publish push; the
        # result guards still block publish if the matrix or the e2e
        # suite actually ran and failed.
        if: >-
            always() &&
            github.ref == 'refs/heads/main' &&
            github.event_name == 'push' &&
            needs.test.result != 'failure' &&
            needs.test.result != 'cancelled' &&
            needs.e2e-site.result != 'failure' &&
            needs.e2e-site.result != 'cancelled'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with: { fetch-depth: 0 }
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm, registry-url: "https://registry.npmjs.org" }
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - uses: changesets/action@v1
              with:
                  publish: pnpm release
                  version: pnpm changeset:version
                  title: "chore(release): version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
                  # setup-node's registry-url writes an .npmrc that reads
                  # auth from NODE_AUTH_TOKEN — without it every publish
                  # PUT is unauthenticated and npm replies E404.
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
