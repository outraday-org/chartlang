name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Test (${{ matrix.os }} / Node ${{ matrix.node }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm typecheck
            - run: pnpm lint
            - run: pnpm format:check
            - run: pnpm test
            - run: pnpm coverage:report   # merges per-package coverage to ./coverage/lcov.info for Codecov
            - run: pnpm conformance
            - run: pnpm tsx scripts/run-conformance.ts --report --check
            - run: pnpm bench:ci
            - run: pnpm docs:check
            - run: pnpm docs:gate
            - run: pnpm docs:build
            - run: pnpm hover:check
            - run: pnpm readme:check
            - if: matrix.os == 'ubuntu-latest' && matrix.node == 20
              uses: codecov/codecov-action@v4
              with:
                  files: ./coverage/lcov.info
                  fail_ci_if_error: true

    # ──────────────────────────────────────────────────────────────────
    # Release job.
    # Maintainers must add NPM_TOKEN to repo secrets before merging a
    # release PR. Manual fallback: `pnpm publish:release` from a
    # maintainer machine.
    # ──────────────────────────────────────────────────────────────────
    release:
        name: Release
        needs: test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with: { fetch-depth: 0 }
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm, registry-url: "https://registry.npmjs.org" }
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - uses: changesets/action@v1
              with:
                  publish: pnpm release
                  title: "chore(release): version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
