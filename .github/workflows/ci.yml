name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Decide whether this push to main is the merge of the
    # `changeset-release/main` "Version Packages" PR. Look up the PR(s)
    # associated with the pushed commit (robust across merge/squash/rebase)
    # and check the head ref. `test` uses this to skip the redundant matrix
    # only on that release merge — every other push still runs it.
    detect:
        name: Detect release merge
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        outputs:
            is_release_merge: ${{ steps.check.outputs.is_release_merge }}
        steps:
            - id: check
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if [ "${{ github.event_name }}" != "push" ]; then
                    echo "is_release_merge=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  n=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
                        --jq '[.[] | select(.head.ref == "changeset-release/main")] | length')
                  echo "associated changeset-release PRs: $n"
                  if [ "$n" -gt 0 ]; then
                    echo "is_release_merge=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "is_release_merge=false" >> "$GITHUB_OUTPUT"
                  fi

    test:
        name: Test (${{ matrix.os }} / Node ${{ matrix.node }})
        needs: detect
        # Skip on the changesets "Version Packages" PR itself, and skip the
        # redundant matrix only on the push that merges that PR — the code
        # being published was already tested on the PR that produced it.
        # Every other push to main (feature merges) still runs the matrix.
        if: >-
            github.head_ref != 'changeset-release/main' &&
            needs.detect.outputs.is_release_merge != 'true'
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm typecheck
            - run: pnpm lint
            - run: pnpm format:check
            - run: pnpm test
            - run: pnpm coverage:report   # merges per-package coverage to ./coverage/lcov.info for Codecov
            - run: pnpm conformance
            - run: pnpm tsx scripts/run-conformance.ts --report --check
            - run: pnpm --filter chartlang-site typecheck
            - run: pnpm --filter chartlang-site build
            - run: pnpm bench:ci
            - run: pnpm docs:check
            - run: pnpm docs:gate
            - run: pnpm docs:build
            - run: pnpm hover:check
            - run: pnpm skills:gate
            - run: pnpm readme:check
            - if: matrix.os == 'ubuntu-latest' && matrix.node == 20
              uses: codecov/codecov-action@v4
              with:
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false

    # ──────────────────────────────────────────────────────────────────
    # apps/site Playwright e2e.
    # Gates the built marketing site's edit→compile→render→recompile
    # loop. Kept behind `needs: test` so the cheaper static gates fail
    # first — no Chromium spin-up when typecheck/build already broke.
    # Own concurrency group so a rebase cancels in-flight e2e runs
    # independently of the matrix.
    # ──────────────────────────────────────────────────────────────────
    e2e-site:
        name: E2E (apps/site/)
        needs: test
        runs-on: ubuntu-latest
        concurrency:
            group: e2e-site-${{ github.ref }}
            cancel-in-progress: true
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter chartlang-site e2e:install
            - run: pnpm --filter "chartlang-site^..." build   # build the site's workspace deps (dist/) — the `test` job gets these from `pnpm build`, this job doesn't
            - run: pnpm --filter chartlang-site build
            - run: pnpm --filter chartlang-site e2e
            - if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: apps/site/playwright-report/
                  retention-days: 7

    # ──────────────────────────────────────────────────────────────────
    # Required-check gate.
    # `test` is skipped on the changeset "Version Packages" PR, which
    # leaves the matrix checks perpetually "Expected" and blocks merge.
    # This job always runs and is the single required status check:
    # it passes when `test` succeeded OR was intentionally skipped, and
    # fails when `test` failed/was cancelled. Point the branch ruleset
    # at "CI Gate" instead of the individual matrix contexts.
    # ──────────────────────────────────────────────────────────────────
    ci-gate:
        name: CI Gate
        needs: test
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Verify test job did not fail
              run: |
                  result="${{ needs.test.result }}"
                  echo "test job result: $result"
                  if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
                    exit 0
                  fi
                  exit 1

    # ──────────────────────────────────────────────────────────────────
    # Release job.
    # Maintainers must add NPM_TOKEN to repo secrets before merging a
    # release PR. Manual fallback: `pnpm publish:release` from a
    # maintainer machine.
    # ──────────────────────────────────────────────────────────────────
    release:
        name: Release
        needs: test
        # Publish on every push to main. `always()` lets this run even
        # when `test` was skipped on the publish push; the result guard
        # still blocks publish if the matrix actually ran and failed.
        if: >-
            always() &&
            github.ref == 'refs/heads/main' &&
            github.event_name == 'push' &&
            needs.test.result != 'failure' &&
            needs.test.result != 'cancelled'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with: { fetch-depth: 0 }
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm, registry-url: "https://registry.npmjs.org" }
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - uses: changesets/action@v1
              with:
                  publish: pnpm release
                  version: pnpm changeset:version
                  title: "chore(release): version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
                  # setup-node's registry-url writes an .npmrc that reads
                  # auth from NODE_AUTH_TOKEN — without it every publish
                  # PUT is unauthenticated and npm replies E404.
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
