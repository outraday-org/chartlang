# netlify/site.toml — REFERENCE build config for chartlang.invinite.com.
#
# NOT currently auto-loaded by Netlify: it only reads a file literally
# named `netlify.toml` from the project's package directory. The live
# build settings are entered in the Netlify dashboard; this file is the
# documented reference and the basis for a future migration to a
# Netlify-read `netlify.toml`. See DEPLOYMENT.md → "Open: consolidate
# config".
#
# SSR is served by @netlify/vite-plugin-tanstack-start, which emits a
# catch-all function (.netlify/v1/functions/server.mjs, path "/*"), so
# the `[[redirects]]` below is superseded while that adapter is in use.
# `publish` points at the static client output.

[build]
    base = "."
    command = "pnpm install --frozen-lockfile && pnpm --filter chartlang-site build"
    publish = "apps/site/dist/client"

[build.environment]
    NODE_VERSION = "20"
    PNPM_VERSION = "9.12.0"

[functions]
    # esbuild ships native binaries and locates them relative to its own
    # package — bundling it into the ESM function breaks it ("__filename is
    # not defined"). Keep it external so the Lambda runtime loads it from
    # node_modules. Mirrors apps/site/vite.config.ts's ssr external.
    #
    # NOTE: typescript's `lib.*.d.ts` default-lib files are NOT shipped to
    # the function by the bundler. Rather than rely on `included_files`,
    # the compiler's lib reads are served in-memory (the `tsDefaultLibs`
    # Vite plugin embeds the ES libs and `src/lib/server/tsDefaultLibs.ts`
    # patches `ts.sys`). See DEPLOYMENT.md → "TypeScript default libs".
    external_node_modules = ["esbuild"]

[[redirects]]
    from = "/api/*"
    to = "/.netlify/functions/:splat"
    status = 200

# Headers — security baseline. No CSP yet (the editor uses inline scripts
# via CodeMirror); revisit when a CSP audit is on the roadmap.
[[headers]]
    for = "/*"
    [headers.values]
        X-Content-Type-Options = "nosniff"
        Referrer-Policy = "strict-origin-when-cross-origin"
        Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# CORS baseline for the public compile endpoint. The real cross-origin
# enforcement (and Netlify-preview `*.netlify.app` allowance) lives in
# the server route's Origin check — Netlify's static headers can't echo a
# dynamic preview origin, so this pins the production domain only.
[[headers]]
    for = "/api/compile"
    [headers.values]
        Access-Control-Allow-Origin = "https://chartlang.invinite.com"
        Access-Control-Allow-Methods = "POST, OPTIONS"
        Access-Control-Allow-Headers = "Content-Type"
