# netlify/docs.toml — REFERENCE build config for docs.chartlang.invinite.com.
# NOT auto-loaded by Netlify (it only reads a file named `netlify.toml`
# from the package directory); the live settings are in the Netlify
# dashboard. See DEPLOYMENT.md → "Open: consolidate config".

[build]
    base = "."
    command = "pnpm install --frozen-lockfile && pnpm docs:build"
    publish = "docs/.vitepress/dist"

[build.environment]
    NODE_VERSION = "20"
    PNPM_VERSION = "9.12.0"

# VitePress generates per-route HTML. No /api/* routes on this site —
# pure static.

[[headers]]
    for = "/*"
    [headers.values]
        X-Content-Type-Options = "nosniff"
        Referrer-Policy = "strict-origin-when-cross-origin"

# Cache fingerprinted assets aggressively; HTML stays short-cache.
[[headers]]
    for = "/assets/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"
